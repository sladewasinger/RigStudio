<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>pip_take_pill preview</title>
<style>
  body { font-family: sans-serif; background: #f3efe7; margin: 20px; }
  #cv { background: #ffffff; border: 1px solid #ccc; }
  .row { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
  #time { font-variant-numeric: tabular-nums; width: 70px; display: inline-block; }
  input[type=range] { width: 420px; }
  .dark #cv { background: #232129; }
</style>
</head>
<body>
<canvas id="cv" width="500" height="640"></canvas>
<div class="row">
  <button id="play">Play</button>
  <button id="pause">Pause</button>
  <button id="replay">Replay</button>
  <button id="darkToggle">Toggle bg</button>
  <span id="time">0.000s</span>
  <input type="range" id="scrub" min="0" max="1.6" step="0.01" value="0">
</div>
<script>
  // The embedded browser pane never fires requestAnimationFrame (hidden-surface
  // throttling), which starves Rive's render loop. Shim it with timers so the
  // runtime can actually paint.
  window.requestAnimationFrame = (cb) => setTimeout(() => cb(performance.now()), 16);
  window.cancelAnimationFrame = (id) => clearTimeout(id);
</script>
<script src="/node_modules/@rive-app/canvas/rive.js"></script>
<script>
  rive.RuntimeLoader.setWasmUrl('/node_modules/@rive-app/canvas/rive.wasm');
  const canvas = document.getElementById('cv');
  const timeEl = document.getElementById('time');
  const scrubEl = document.getElementById('scrub');
  const r = new rive.Rive({
    src: '/out/pip_take_pill.riv',
    canvas,
    autoplay: false,
    animations: 'take_pill',
    layout: new rive.Layout({ fit: rive.Fit.Contain, alignment: rive.Alignment.Center }),
    onLoad: () => {
      if (typeof r.resizeDrawingSurfaceToCanvasSize === 'function') {
        r.resizeDrawingSurfaceToCanvasSize();
      }
      r.scrub('take_pill', 0);
      document.title = 'pip_take_pill LOADED';
    },
    onLoadError: (e) => { document.title = 'pip_take_pill LOAD ERROR'; console.error(e); }
  });
  document.getElementById('play').onclick = () => r.play('take_pill');
  document.getElementById('pause').onclick = () => r.pause('take_pill');
  document.getElementById('replay').onclick = () => { r.stop('take_pill'); r.scrub('take_pill', 0); r.play('take_pill'); };
  document.getElementById('darkToggle').onclick = () => document.body.classList.toggle('dark');
  scrubEl.oninput = () => {
    const t = parseFloat(scrubEl.value);
    r.pause('take_pill');
    r.scrub('take_pill', t);
    timeEl.textContent = t.toFixed(3) + 's';
  };
</script>
</body>
</html>
