<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rig Studio - .riv playback + state-machine check</title>
    <!-- Official Rive canvas runtime (UMD -> global `rive`), served from node_modules by
         the Vite dev server. THROWAWAY: verification harness only, not app code.

         Two checks, both reported into window.__rivCheck (read it via the preview
         browser's javascript_tool):

         1. STATE MACHINE (self-contained): builds a tiny RigDoc with one machine in-page,
            exports it with the REAL exporter (imported from /src/exportRiv.ts — Vite
            transforms the .ts on the fly), loads the .riv in the official runtime, then
            DRIVES it: resolve Entry->A, set the bool input and advance a 400ms blend
            (sampling mid-blend), then fire the trigger. It asserts the keyed arm node's
            rotation moves A->B and settles, that the mid-blend sample is strictly between
            the endpoints, and that the trigger transition fires — a stricter, input-driven
            correctness check than counting pixels.

         2. WHOLE-DOC PLAYBACK (optional): if localStorage.__rivB64 is present (produced in
            the app via window.__rigStudio.exportRiv), it also samples every animation's
            keyed node rotations across the timeline.

         NOTE ON PIXELS: this headless preview cannot read back Canvas2D pixels rendered by
         the Rive wasm (a known-good .riv reads 0 pixels here too; rAF never ticks). So we
         verify at the TRANSFORM level using the low-level LinearAnimationInstance /
         StateMachineInstance APIs, which advance deterministically without rAF. -->
    <script src="/node_modules/@rive-app/canvas/rive.js"></script>
    <style>
      body { font-family: monospace; padding: 12px; }
      canvas { border: 1px solid #888; }
      pre { white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <canvas id="c" width="200" height="200"></canvas>
    <pre id="out">running…</pre>
    <script type="module">
      import { exportRiv } from '/src/exportRiv.ts';

      const DEG = 180 / Math.PI;
      const wait = (ms) => new Promise((r) => setTimeout(r, ms));
      const report = (obj) => {
        window.__rivCheck = obj;
        document.getElementById('out').textContent = JSON.stringify(obj, null, 2);
      };

      /**
       * Minimal doc: a single 'arm' part whose rotation is keyed by two clips (A -> 0deg,
       * B -> 60deg), plus a machine M with a bool `go`, a trigger `zap`, entry/any + two
       * animation states, and transitions Entry->A (unconditional), A->B (go==true, 400ms
       * blend), B->A (zap trigger, instant).
       */
      function liveDoc() {
        const d = 'M 0,0 L 20,0 L 20,20 L 0,20 Z';
        const arm = {
          id: 'p_arm', label: 'arm', kind: 'art', transform: '', pivot: { x: 0, y: 0 },
          pivotHint: null, rest: { rotate: 0, tx: 40, ty: 40, sx: 1, sy: 1, kx: 0, ky: 0 },
          parentId: null,
          paths: [{
            id: 'arm_path', label: 'arm_path', d, fill: '#cc3366', fillOpacity: 1,
            stroke: null, strokeWidth: 1, strokeOpacity: 1, transform: '',
          }],
        };
        const clip = (name, val) => ({
          name, duration: 1000,
          tracks: [{ target: 'p_arm', channel: 'rotate', keyframes: [{ time: 0, value: val, easing: 'linear' }] }],
        });
        const machine = {
          id: 'sm1', name: 'M',
          inputs: [
            { id: 'i_go', name: 'go', type: 'bool', default: false },
            { id: 'i_zap', name: 'zap', type: 'trigger' },
          ],
          states: [
            { id: 's_entry', name: 'Entry', kind: 'entry' },
            { id: 's_any', name: 'Any', kind: 'any' },
            { id: 's_a', name: 'A', kind: 'animation', clipName: 'A' },
            { id: 's_b', name: 'B', kind: 'animation', clipName: 'B' },
          ],
          transitions: [
            { id: 't1', fromId: 's_entry', toId: 's_a', durationMs: 0, conditions: [] },
            { id: 't2', fromId: 's_a', toId: 's_b', durationMs: 400, conditions: [{ inputId: 'i_go', op: '==', value: true }] },
            { id: 't3', fromId: 's_b', toId: 's_a', durationMs: 0, conditions: [{ inputId: 'i_zap' }] },
          ],
          listeners: [],
        };
        return {
          name: 'M', viewBox: { x: 0, y: 0, w: 100, h: 100 }, parts: [arm],
          rootPivot: { x: 50, y: 50 }, clips: [clip('A', 0), clip('B', 60)],
          stateMachines: [machine],
        };
      }

      async function loadRive(bytes, canvas) {
        let inst;
        const loaded = new Promise((resolve, reject) => {
          inst = new window.rive.Rive({
            buffer: bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength),
            canvas, autoplay: false,
            onLoad: () => resolve(),
            onLoadError: (e) => reject(new Error(String(e && (e.message || e.data || e)))),
          });
        });
        await Promise.race([loaded, wait(5000).then(() => { throw new Error('load timeout'); })]);
        return inst;
      }

      async function stateMachineCheck() {
        const bytes = exportRiv(liveDoc());
        const inst = await loadRive(bytes, document.getElementById('c'));
        const rt = inst.runtime, ab = inst.artboard;

        const smNames = inst.stateMachineNames || [];
        const smDef = ab.stateMachineByName('M');
        if (!smDef) throw new Error('state machine "M" not found in artboard');
        const smi = new rt.StateMachineInstance(smDef, ab);

        const inputs = [];
        for (let i = 0; i < smi.inputCount(); i++) inputs.push(smi.input(i));
        const inputByName = (n) => inputs.find((x) => x.name === n) || null;
        const armDeg = () => { const n = ab.node('arm'); return n ? +(n.rotation * DEG).toFixed(3) : null; };
        const stateChanges = () => {
          const a = [];
          for (let i = 0; i < smi.stateChangedCount(); i++) a.push(smi.stateChangedNameByIndex(i));
          return a;
        };

        // Enumerate inputs (names + wasm core-type ids: 59=bool, 56=number, 58=trigger).
        const inputInfo = inputs.map((x) => ({ name: x.name, type: x.type }));

        // 1) Resolve Entry -> A. A keys arm.rotate = 0deg.
        smi.advanceAndApply(0.0);
        const rStart = armDeg();
        const cStart = stateChanges();

        // 2) Set the bool. The low-level SMIInput must be narrowed with asBool() before
        //    its value setter takes. One tiny advance fires the A->B transition (the mix
        //    only begins AFTER the advance that satisfies the condition).
        const go = inputByName('go');
        (go.asBool ? go.asBool() : go).value = true;
        smi.advanceAndApply(0.001);
        const cFire = stateChanges();

        // 3) Advance ~200ms into the 400ms blend: rotation strictly between 0 and 60.
        smi.advanceAndApply(0.2);
        const rMid = armDeg();

        // 4) Finish the blend so B is the settled current state (needed before B's own
        //    outgoing transition will evaluate).
        smi.advanceAndApply(0.8);
        const rEnd = armDeg();

        // 5) Fire the trigger (narrow with asTrigger()): B -> A (instant), back to 0deg.
        const zap = inputByName('zap');
        (zap.asTrigger ? zap.asTrigger() : zap).fire();
        smi.advanceAndApply(0.05);
        const rZap = armDeg();

        const eps = 1.0; // deg tolerance for settled endpoints
        const checks = {
          entryResolvedToA: JSON.stringify(cStart) === JSON.stringify(['A']),
          boolFiredAToB: JSON.stringify(cFire) === JSON.stringify(['B']),
          startNearA: Math.abs(rStart - 0) < eps,
          midStrictlyBetween: rMid > rStart + 1 && rMid < rEnd - 1,
          midNear30: Math.abs(rMid - 30) < 18,
          endNearB: Math.abs(rEnd - 60) < eps,
          triggerBackToA: Math.abs(rZap - 0) < eps,
        };
        const pass = Object.values(checks).every(Boolean);

        if (smi.delete) smi.delete();
        return {
          stateMachineNames: smNames,
          inputs: inputInfo,
          rotationsDeg: { rStart, rMid, rEnd, rZap },
          checks,
          pass,
        };
      }

      // Optional: whole-doc playback sampling if the app stashed an export in localStorage.
      async function wholeDocCheck() {
        const b64 = localStorage.getItem('__rivB64');
        if (!b64) return null;
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const inst = await loadRive(bytes, document.getElementById('c'));
        const rt = inst.runtime, ab = inst.artboard;
        const animations = inst.animationNames.map((name) => {
          const anim = ab.animationByName(name);
          const samples = {};
          for (const t of [0, 0.25, 0.5, 0.75, 1.0]) {
            const li = new rt.LinearAnimationInstance(anim, ab);
            li.advance(t); li.apply(1.0); ab.advance(0);
            for (const nm of ['right_arm', 'left_arm', 'body', 'arm', 'sq']) {
              const node = ab.node(nm);
              if (node) (samples[nm] = samples[nm] || []).push(+(node.rotation * DEG).toFixed(2));
            }
          }
          return { name, rotationSamplesDeg: samples };
        });
        return { artboards: inst.artboardNames, animations };
      }

      async function main() {
        try {
          if (!window.rive) throw new Error('Rive runtime failed to load');
          window.rive.RuntimeLoader.setWasmUrl('/node_modules/@rive-app/canvas/rive.wasm');
          const stateMachine = await stateMachineCheck();
          const wholeDoc = await wholeDocCheck();
          report({
            status: 'ok',
            note: 'Pixel readback unavailable in this headless env; verified at transform level.',
            stateMachine,
            wholeDoc,
          });
        } catch (e) {
          report({ status: 'error', error: String((e && e.message) || e) });
        }
      }
      main();
    </script>
  </body>
</html>
