<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rig Studio - .riv playback + state-machine check</title>
    <!-- Official Rive canvas runtime (UMD -> global `rive`), served from node_modules by
         the Vite dev server. THROWAWAY: verification harness only, not app code.

         Two checks, both reported into window.__rivCheck (read it via the preview
         browser's javascript_tool):

         1. STATE MACHINE (self-contained): builds a tiny RigDoc with one machine in-page,
            exports it with the REAL exporter (imported from /src/io/riv/index.ts — Vite
            transforms the .ts on the fly), loads the .riv in the official runtime, then
            DRIVES it: resolve Entry->A, set the bool input and advance a 400ms blend
            (sampling mid-blend), then fire the trigger. It asserts the keyed arm node's
            rotation moves A->B and settles, that the mid-blend sample is strictly between
            the endpoints, and that the trigger transition fires — a stricter, input-driven
            correctness check than counting pixels.

         2. WHOLE-DOC PLAYBACK (optional): if localStorage.__rivB64 is present (produced in
            the app via window.__rigStudio.exportRiv), it also samples every animation's
            keyed node rotations across the timeline.

         NOTE ON PIXELS: rAF never ticks in this headless preview, so anything routed
         through the wrapper's render loop never paints — the transform-level checks
         below predate knowing the workaround. Pixel readback DOES work when the
         wrapper's clear/align/draw/flush sequence is invoked directly (see
         skinnedCheck's drawNow), which the skinned-deformation check uses. -->
    <script src="/node_modules/@rive-app/canvas/rive.js"></script>
    <style>
      body { font-family: monospace; padding: 12px; }
      canvas { border: 1px solid #888; }
      pre { white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <canvas id="c" width="200" height="200"></canvas>
    <!-- Skinned-deformation check draws 1:1 (100x100 artboard on a 100x100 canvas) via
         its own low-level renderer so getImageData samples exact artboard coords. -->
    <canvas id="c2" width="100" height="100"></canvas>
    <pre id="out">running…</pre>
    <script type="module">
      import { exportRiv } from '/src/io/riv/index.ts';

      const DEG = 180 / Math.PI;
      const wait = (ms) => new Promise((r) => setTimeout(r, ms));
      const report = (obj) => {
        window.__rivCheck = obj;
        document.getElementById('out').textContent = JSON.stringify(obj, null, 2);
      };

      /**
       * Minimal doc: a single 'arm' part whose rotation is keyed by two clips (A -> 0deg,
       * B -> 60deg), plus a machine M with a bool `go`, a trigger `zap`, entry/any + two
       * animation states, and transitions Entry->A (unconditional), A->B (go==true, 400ms
       * blend), B->A (zap trigger, instant).
       */
      function liveDoc() {
        const d = 'M 0,0 L 20,0 L 20,20 L 0,20 Z';
        const arm = {
          id: 'p_arm', label: 'arm', kind: 'art', transform: '', pivot: { x: 0, y: 0 },
          pivotHint: null, rest: { rotate: 0, tx: 40, ty: 40, sx: 1, sy: 1, kx: 0, ky: 0 },
          parentId: null,
          paths: [{
            id: 'arm_path', label: 'arm_path', d, fill: '#cc3366', fillOpacity: 1,
            stroke: null, strokeWidth: 1, strokeOpacity: 1, transform: '',
          }],
        };
        const clip = (name, val) => ({
          name, duration: 1000,
          tracks: [{ target: 'p_arm', channel: 'rotate', keyframes: [{ time: 0, value: val, easing: 'linear' }] }],
        });
        const machine = {
          id: 'sm1', name: 'M',
          inputs: [
            { id: 'i_go', name: 'go', type: 'bool', default: false },
            { id: 'i_zap', name: 'zap', type: 'trigger' },
          ],
          states: [
            { id: 's_entry', name: 'Entry', kind: 'entry' },
            { id: 's_any', name: 'Any', kind: 'any' },
            { id: 's_a', name: 'A', kind: 'animation', clipName: 'A' },
            { id: 's_b', name: 'B', kind: 'animation', clipName: 'B' },
          ],
          transitions: [
            { id: 't1', fromId: 's_entry', toId: 's_a', durationMs: 0, conditions: [] },
            { id: 't2', fromId: 's_a', toId: 's_b', durationMs: 400, conditions: [{ inputId: 'i_go', op: '==', value: true }] },
            { id: 't3', fromId: 's_b', toId: 's_a', durationMs: 0, conditions: [{ inputId: 'i_zap' }] },
          ],
          listeners: [],
        };
        return {
          name: 'M', viewBox: { x: 0, y: 0, w: 100, h: 100 }, parts: [arm],
          rootPivot: { x: 50, y: 50 }, clips: [clip('A', 0), clip('B', 60)],
          stateMachines: [machine],
        };
      }

      async function loadRive(bytes, canvas) {
        let inst;
        const loaded = new Promise((resolve, reject) => {
          inst = new window.rive.Rive({
            buffer: bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength),
            canvas, autoplay: false,
            onLoad: () => resolve(),
            onLoadError: (e) => reject(new Error(String(e && (e.message || e.data || e)))),
          });
        });
        await Promise.race([loaded, wait(5000).then(() => { throw new Error('load timeout'); })]);
        return inst;
      }

      async function stateMachineCheck() {
        const bytes = exportRiv(liveDoc());
        const inst = await loadRive(bytes, document.getElementById('c'));
        const rt = inst.runtime, ab = inst.artboard;

        const smNames = inst.stateMachineNames || [];
        const smDef = ab.stateMachineByName('M');
        if (!smDef) throw new Error('state machine "M" not found in artboard');
        const smi = new rt.StateMachineInstance(smDef, ab);

        const inputs = [];
        for (let i = 0; i < smi.inputCount(); i++) inputs.push(smi.input(i));
        const inputByName = (n) => inputs.find((x) => x.name === n) || null;
        const armDeg = () => { const n = ab.node('arm'); return n ? +(n.rotation * DEG).toFixed(3) : null; };
        const stateChanges = () => {
          const a = [];
          for (let i = 0; i < smi.stateChangedCount(); i++) a.push(smi.stateChangedNameByIndex(i));
          return a;
        };

        // Enumerate inputs (names + wasm core-type ids: 59=bool, 56=number, 58=trigger).
        const inputInfo = inputs.map((x) => ({ name: x.name, type: x.type }));

        // 1) Resolve Entry -> A. A keys arm.rotate = 0deg.
        smi.advanceAndApply(0.0);
        const rStart = armDeg();
        const cStart = stateChanges();

        // 2) Set the bool. The low-level SMIInput must be narrowed with asBool() before
        //    its value setter takes. One tiny advance fires the A->B transition (the mix
        //    only begins AFTER the advance that satisfies the condition).
        const go = inputByName('go');
        (go.asBool ? go.asBool() : go).value = true;
        smi.advanceAndApply(0.001);
        const cFire = stateChanges();

        // 3) Advance ~200ms into the 400ms blend: rotation strictly between 0 and 60.
        smi.advanceAndApply(0.2);
        const rMid = armDeg();

        // 4) Finish the blend so B is the settled current state (needed before B's own
        //    outgoing transition will evaluate).
        smi.advanceAndApply(0.8);
        const rEnd = armDeg();

        // 5) Fire the trigger (narrow with asTrigger()): B -> A (instant), back to 0deg.
        const zap = inputByName('zap');
        (zap.asTrigger ? zap.asTrigger() : zap).fire();
        smi.advanceAndApply(0.05);
        const rZap = armDeg();

        const eps = 1.0; // deg tolerance for settled endpoints
        const checks = {
          entryResolvedToA: JSON.stringify(cStart) === JSON.stringify(['A']),
          boolFiredAToB: JSON.stringify(cFire) === JSON.stringify(['B']),
          startNearA: Math.abs(rStart - 0) < eps,
          midStrictlyBetween: rMid > rStart + 1 && rMid < rEnd - 1,
          midNear30: Math.abs(rMid - 30) < 18,
          endNearB: Math.abs(rEnd - 60) < eps,
          triggerBackToA: Math.abs(rZap - 0) < eps,
        };
        const pass = Object.values(checks).every(Boolean);

        if (smi.delete) smi.delete();
        return {
          stateMachineNames: smNames,
          inputs: inputInfo,
          rotationsDeg: { rStart, rMid, rEnd, rZap },
          checks,
          pass,
        };
      }

      /**
       * EXIT-TIME doc: the user's broken-file shape, fixed. A trigger `go`, entry->idle
       * (looping, rotate 0), idle->wave (fires on `go`; wave is non-looping, rotate 90),
       * and wave->idle with exitFraction 1 ("wait for the animation to finish"). Proves the
       * .riv exit-time bytes drive the OFFICIAL runtime: firing the trigger enters wave and,
       * once the 200ms wave clip completes, the machine returns to idle on its own.
       */
      function exitTimeDoc() {
        const d = 'M 0,0 L 20,0 L 20,20 L 0,20 Z';
        const arm = {
          id: 'p_arm', label: 'arm', kind: 'art', transform: '', pivot: { x: 0, y: 0 },
          pivotHint: null, rest: { rotate: 0, tx: 40, ty: 40, sx: 1, sy: 1, kx: 0, ky: 0 },
          parentId: null,
          paths: [{
            id: 'arm_path', label: 'arm_path', d, fill: '#33aa66', fillOpacity: 1,
            stroke: null, strokeWidth: 1, strokeOpacity: 1, transform: '',
          }],
        };
        const clip = (name, dur, val) => ({
          name, duration: dur,
          tracks: [{ target: 'p_arm', channel: 'rotate', keyframes: [{ time: 0, value: val, easing: 'linear' }] }],
        });
        const machine = {
          id: 'sm1', name: 'X',
          inputs: [{ id: 'i_go', name: 'go', type: 'trigger' }],
          states: [
            { id: 's_entry', name: 'Entry', kind: 'entry' },
            { id: 's_any', name: 'Any', kind: 'any' },
            { id: 's_exit', name: 'Exit', kind: 'exit' },
            { id: 's_idle', name: 'idle', kind: 'animation', clipName: 'idle', loop: true },
            { id: 's_wave', name: 'wave', kind: 'animation', clipName: 'wave', loop: false },
          ],
          transitions: [
            { id: 't1', fromId: 's_entry', toId: 's_idle', durationMs: 0, conditions: [] },
            { id: 't2', fromId: 's_idle', toId: 's_wave', durationMs: 0, conditions: [{ inputId: 'i_go' }] },
            { id: 't3', fromId: 's_wave', toId: 's_idle', durationMs: 0, conditions: [], exitFraction: 1 },
          ],
          listeners: [],
        };
        return {
          name: 'X', viewBox: { x: 0, y: 0, w: 100, h: 100 }, parts: [arm],
          rootPivot: { x: 50, y: 50 }, clips: [clip('idle', 1000, 0), clip('wave', 200, 90)],
          stateMachines: [machine],
        };
      }

      async function exitTimeCheck() {
        const bytes = exportRiv(exitTimeDoc());
        const inst = await loadRive(bytes, document.getElementById('c'));
        const rt = inst.runtime, ab = inst.artboard;
        const smDef = ab.stateMachineByName('X');
        if (!smDef) throw new Error('state machine "X" not found in artboard');
        const smi = new rt.StateMachineInstance(smDef, ab);
        const inputs = [];
        for (let i = 0; i < smi.inputCount(); i++) inputs.push(smi.input(i));
        const go = inputs.find((x) => x.name === 'go');
        const armDeg = () => { const n = ab.node('arm'); return n ? +(n.rotation * DEG).toFixed(3) : null; };
        const changes = () => {
          const a = [];
          for (let i = 0; i < smi.stateChangedCount(); i++) a.push(smi.stateChangedNameByIndex(i));
          return a;
        };

        smi.advanceAndApply(0.0); // entry -> idle
        const cEntry = changes();
        const rIdle0 = armDeg();

        (go.asTrigger ? go.asTrigger() : go).fire();
        smi.advanceAndApply(0.001); // idle -> wave
        const cToWave = changes();
        const rWave = armDeg();

        smi.advanceAndApply(0.15); // 151ms into the 200ms wave — exit time NOT reached yet
        const rMid = armDeg();

        smi.advanceAndApply(0.1); // 251ms — wave finished, exit time reached -> back to idle
        const cBack = changes();
        const rBack = armDeg();

        const eps = 1.0;
        const checks = {
          entryResolvedToIdle: JSON.stringify(cEntry) === JSON.stringify(['idle']),
          triggerToWave: JSON.stringify(cToWave) === JSON.stringify(['wave']),
          waveRotation90: Math.abs(rWave - 90) < eps,
          heldWaveBeforeExit: Math.abs(rMid - 90) < eps, // still posing wave before exit time
          exitReturnedToIdle: JSON.stringify(cBack) === JSON.stringify(['idle']),
          idleRotation0: Math.abs(rBack - 0) < eps,
        };
        const pass = Object.values(checks).every(Boolean);
        if (smi.delete) smi.delete();
        return {
          rotationsDeg: { rIdle0, rWave, rMid, rBack },
          stateChanges: { cEntry, cToWave, cBack },
          checks, pass,
        };
      }

      // Optional: whole-doc playback sampling if the app stashed an export in localStorage.
      async function wholeDocCheck() {
        const b64 = localStorage.getItem('__rivB64');
        if (!b64) return null;
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const inst = await loadRive(bytes, document.getElementById('c'));
        const rt = inst.runtime, ab = inst.artboard;
        const animations = inst.animationNames.map((name) => {
          const anim = ab.animationByName(name);
          const samples = {};
          for (const t of [0, 0.25, 0.5, 0.75, 1.0]) {
            const li = new rt.LinearAnimationInstance(anim, ab);
            li.advance(t); li.apply(1.0); ab.advance(0);
            for (const nm of ['right_arm', 'left_arm', 'body', 'arm', 'sq']) {
              const node = ab.node(nm);
              if (node) (samples[nm] = samples[nm] || []).push(+(node.rotation * DEG).toFixed(2));
            }
          }
          return { name, rotationSamplesDeg: samples };
        });
        return { artboards: inst.artboardNames, animations };
      }

      /**
       * .riv EXPORT COMPLETIONS wave (2026-07-13): z draw order (DrawRules/DrawTarget),
       * opacity keys, full hidden-part exclusion — all three at once. `hidden_part` has
       * `hidden: true`; if it survived export it would show up as `ab.node('hidden_part')`.
       * `mover`'s z track (0 -> 100 at 500ms) drives it in front of/behind `stack_top` via
       * a keyed DrawRules.drawTargetId. `fader`'s fill opacity is keyed 1 -> 0.
       * NOTE ON DRAW ORDER / OPACITY PIXELS: this harness's rive-js wrapper exposes nodes
       * (`ab.node`) but not a paint-color or draw-order introspection API, so this check
       * can only prove the file LOADS CLEAN (the real bar for "did the schema addition
       * work" — a bad ToC/object stream throws on load) and that the hidden node is
       * truly absent. Actual on-screen stacking/fade — see exportRiv.test.ts's decoder-
       * level assertions for the byte-exact math — goes on Austin's visual review list.
       */
      function drawOrderOpacityHiddenDoc() {
        const sq = (id, label, fill) => ({
          id, label, kind: 'art', transform: '', pivot: { x: 0, y: 0 }, pivotHint: null,
          rest: { rotate: 0, tx: 10, ty: 10, sx: 1, sy: 1, kx: 0, ky: 0, opacity: 1 },
          parentId: null,
          paths: [{
            id: id + '_p', label: id + '_p', d: 'M 0,0 L 20,0 L 20,20 L 0,20 Z',
            fill, fillOpacity: 1, stroke: null, strokeWidth: 1, strokeOpacity: 1, transform: '',
          }],
        });
        const stackBottom = sq('p_bottom', 'stack_bottom', '#336699');
        const stackTop = sq('p_top', 'stack_top', '#99cc33');
        const mover = sq('p_mover', 'mover', '#cc3366');
        const fader = sq('p_fader', 'fader', '#ffaa00');
        const hidden = { ...sq('p_hidden', 'hidden_part', '#000000'), hidden: true };
        const clip = {
          name: 'demo', duration: 1000,
          tracks: [
            { target: 'p_mover', channel: 'z', keyframes: [
              { time: 0, value: 0, easing: 'linear' },
              { time: 500, value: 100, easing: 'linear' },
            ] },
            { target: 'p_fader', channel: 'opacity', keyframes: [
              { time: 0, value: 1, easing: 'linear' },
              { time: 500, value: 0, easing: 'linear' },
            ] },
          ],
        };
        return {
          name: 'draw_order_opacity_hidden', viewBox: { x: 0, y: 0, w: 100, h: 100 },
          parts: [stackBottom, stackTop, mover, fader, hidden],
          rootPivot: { x: 50, y: 50 }, clips: [clip],
        };
      }

      async function drawOrderOpacityHiddenCheck() {
        const bytes = exportRiv(drawOrderOpacityHiddenDoc());
        const inst = await loadRive(bytes, document.getElementById('c'));
        const ab = inst.artboard;
        const present = ['stack_bottom', 'stack_top', 'mover', 'fader'].map((n) => !!ab.node(n));
        const hiddenAbsent = !ab.node('hidden_part');
        const li = new inst.runtime.LinearAnimationInstance(ab.animationByName('demo'), ab);
        li.advance(0); li.apply(1.0); // just prove advance/apply doesn't throw either
        const checks = {
          loadedWithoutError: true,
          visiblePartsPresent: present.every(Boolean),
          hiddenPartAbsent: hiddenAbsent,
        };
        return { checks, pass: Object.values(checks).every(Boolean) };
      }

      /**
       * SKELETAL DEFORMATION (skinned-part export wave, 2026-07-13): a horizontal red
       * bar (10,45)-(90,55) with a MID-SPAN vertex column at x=50, skinned to a 2-bone
       * chain along its spine — b1 (10,50)->(50,50), b2 (50,50)->(90,50) child of b1,
       * identity bind — with a clip keying b2.rotate 0 -> 90deg. Mirrors
       * src/__tests__/exportRivSkin.test.ts's fixture (that one has no midpoints; the
       * subdivision here exists so the BEND is visible — LBS moves vertices, and a
       * 4-corner quad under a bent chain just skews with straight edges, exactly like
       * the editor's own LBS on the same path). PIXEL-LEVEL articulation asserts, at
       * ~89deg: the inner half holds still at (25,50), the outer half leaves (75,50)
       * and arrives rotated-down at (52,80).
       *
       * Rendering: the wrapper's own clear/align/draw/flush sequence invoked DIRECTLY
       * (drawNow below — the body of rive.js's Rive.draw minus its gating), 1:1 on a
       * 100x100 canvas, then getImageData. Three hard-won facts: (a) pixel readback
       * DOES work here (the old "unavailable" note predated this) — but only after
       * renderer.flush(), because the wasm renderer buffers commands; (b) the public
       * drawFrame()/rAF paths are unreliable in this headless preview —
       * document.timeline.currentTime gates drawFrame's synchronous branch and rAF
       * never ticks, so once any instance has a pending frame request its drawFrame
       * silently no-ops forever; (c) advance() on a LOOPING clip wraps at the exact
       * duration — advance to 0.99, never 1.0.
       */
      function skinnedDoc() {
        const bone = (id, label, px, py, tx, ty, parentId) => ({
          id, label, kind: 'bone', transform: '', pivot: { x: px, y: py },
          boneTip: { x: tx, y: ty }, pivotHint: null, parentId,
          rest: { rotate: 0, tx: 0, ty: 0, sx: 1, sy: 1, kx: 0, ky: 0, opacity: 1 },
          paths: [],
        });
        const I = { a: 1, b: 0, c: 0, d: 1, e: 0, f: 0 };
        const limb = {
          id: 'p_limb', label: 'limb', kind: 'art', transform: '',
          pivot: { x: 50, y: 50 }, pivotHint: null, parentId: null,
          rest: { rotate: 0, tx: 0, ty: 0, sx: 1, sy: 1, kx: 0, ky: 0, opacity: 1 },
          skin: {
            bones: [
              { id: 'p_b1', restWorldInv: I, bindSeg: { p: { x: 10, y: 50 }, q: { x: 50, y: 50 } } },
              { id: 'p_b2', restWorldInv: I, bindSeg: { p: { x: 50, y: 50 }, q: { x: 90, y: 50 } } },
            ],
          },
          paths: [{
            id: 'limb_path', label: 'limb_path',
            d: 'M 10,45 L 50,45 L 90,45 L 90,55 L 50,55 L 10,55 Z',
            fill: '#cc3366', fillOpacity: 1, stroke: null, strokeWidth: 1, strokeOpacity: 1,
            transform: '',
          }],
        };
        return {
          name: 'skin_check', viewBox: { x: 0, y: 0, w: 100, h: 100 },
          parts: [bone('p_b1', 'b1', 10, 50, 50, 50, null), bone('p_b2', 'b2', 50, 50, 90, 50, 'p_b1'), limb],
          rootPivot: { x: 50, y: 50 },
          clips: [{
            name: 'bend', duration: 1000,
            tracks: [{
              target: 'p_b2', channel: 'rotate', keyframes: [
                { time: 0, value: 0, easing: 'linear' },
                { time: 1000, value: 90, easing: 'linear' },
              ],
            }],
          }],
        };
      }

      async function skinnedCheck() {
        const bytes = exportRiv(skinnedDoc());
        const canvas = document.getElementById('c2');
        const inst = await loadRive(bytes, canvas);
        const rt = inst.runtime, ab = inst.artboard;
        const ctx2d = canvas.getContext('2d');
        const px = (x, y) => Array.from(ctx2d.getImageData(x, y, 1, 1).data);
        // #cc3366 with generous tolerance (AA at edges is avoided by sampling interiors).
        const isRed = (p) => p[3] > 200 && p[0] > 150 && p[1] < 120 && p[2] < 160;
        // The wrapper's Rive.draw body minus its timeline/rAF gating (see the doc
        // comment above): its own renderer + alignment, then an explicit flush.
        const drawNow = () => {
          const renderer = inst.renderer;
          renderer.clear();
          renderer.save();
          inst.alignRenderer();
          ab.draw(renderer);
          renderer.restore();
          renderer.flush();
          if (typeof rt.resolveAnimationFrame === 'function') rt.resolveAnimationFrame();
        };

        const bones = typeof ab.bone === 'function'
          ? { b1: !!ab.bone('b1'), b2: !!ab.bone('b2') }
          : { unavailable: true };

        const anim = ab.animationByName('bend');
        const li = new rt.LinearAnimationInstance(anim, ab);
        li.advance(0); li.apply(1.0); ab.advance(0);
        drawNow();
        const rest = { inner: px(25, 50), outer: px(75, 50), below: px(52, 80) };

        li.advance(0.99); li.apply(1.0); ab.advance(0); // 89.1deg (1.0 would loop-wrap to 0)
        drawNow();
        const bent = {
          inner: px(25, 50), outer: px(75, 50), below: px(52, 80),
          b2deg: ab.bone('b2') ? +(ab.bone('b2').rotation * DEG).toFixed(1) : null,
        };

        const pixelsReadable = rest.inner.some((v) => v !== 0) || rest.outer.some((v) => v !== 0);
        const checks = {
          loadedWithoutError: true,
          bonesResolvable: bones.unavailable ? 'api-unavailable' : bones.b1 && bones.b2,
          pixelsReadable,
          restBarPresent: isRed(rest.inner) && isRed(rest.outer) && !isRed(rest.below),
          bentOuterHalfLeft: !isRed(bent.outer),
          bentSegmentArrivedBelow: isRed(bent.below),
          innerHalfHeldStill: isRed(bent.inner),
        };
        const hard = pixelsReadable
          ? ['restBarPresent', 'bentOuterHalfLeft', 'bentSegmentArrivedBelow', 'innerHalfHeldStill']
          : []; // without pixels only the load/bone checks are provable here
        const pass = checks.loadedWithoutError &&
          checks.bonesResolvable !== false &&
          hard.every((k) => checks[k]);
        return { bones, rest, bent, checks, pass };
      }

      async function main() {
        try {
          if (!window.rive) throw new Error('Rive runtime failed to load');
          window.rive.RuntimeLoader.setWasmUrl('/node_modules/@rive-app/canvas/rive.wasm');
          const stateMachine = await stateMachineCheck();
          const exitTime = await exitTimeCheck();
          const wholeDoc = await wholeDocCheck();
          const drawOrderOpacityHidden = await drawOrderOpacityHiddenCheck();
          const skinned = await skinnedCheck();
          report({
            status: 'ok',
            note: 'Transform-level checks + pixel-level skinned articulation (drawNow flush).',
            stateMachine,
            exitTime,
            wholeDoc,
            drawOrderOpacityHidden,
            skinned,
          });
        } catch (e) {
          report({ status: 'error', error: String((e && e.message) || e) });
        }
      }
      main();
    </script>
  </body>
</html>
